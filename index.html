<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larder</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>
            Larder
        </div>
        <div class="nav-controls">
            <input type="text" id="search-input" class="search-input" placeholder="Search recipes...">
            <a href="basics" class="nav-link">Basics</a>
            <a href="cms" class="nav-link">Manage</a>
        </div>
    </nav>

    <!-- Category Filters & Macros Toggle -->
    <div class="filters-bar">
        <div class="category-filters" id="category-filters"></div>
        <button id="toggle-macro-filters" class="btn secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; vertical-align: text-bottom;"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Macro Filters
        </button>
    </div>

    <!-- Macro Filters Panel -->
    <div id="macro-filters-panel" class="macro-filters-panel hidden">
        <div class="macro-filters-header">
            <span>Nutritional Filters</span>
            <span class="macro-filters-note">Per Serving</span>
        </div>
        <div class="macro-filters-grid">
            <div class="macro-filter-group">
                <label>Calories <span class="filter-val-label" id="filter-cal-val">Any</span></label>
                <div class="dual-range-slider">
                    <div class="slider-track" id="track-cal"></div>
                    <input type="range" id="filter-cal-min" min="0" max="2000" step="50" value="0">
                    <input type="range" id="filter-cal-max" min="0" max="2000" step="50" value="2000">
                </div>
            </div>
            <div class="macro-filter-group">
                <label>Carbs <span class="filter-val-label" id="filter-carbs-val">Any</span></label>
                <div class="dual-range-slider">
                    <div class="slider-track" id="track-carbs"></div>
                    <input type="range" id="filter-carbs-min" min="0" max="200" step="5" value="0">
                    <input type="range" id="filter-carbs-max" min="0" max="200" step="5" value="200">
                </div>
            </div>
            <div class="macro-filter-group">
                <label>Protein <span class="filter-val-label" id="filter-protein-val">Any</span></label>
                <div class="dual-range-slider">
                    <div class="slider-track" id="track-protein"></div>
                    <input type="range" id="filter-protein-min" min="0" max="150" step="5" value="0">
                    <input type="range" id="filter-protein-max" min="0" max="150" step="5" value="150">
                </div>
            </div>
            <div class="macro-filter-group">
                <label>Fat <span class="filter-val-label" id="filter-fat-val">Any</span></label>
                <div class="dual-range-slider">
                    <div class="slider-track" id="track-fat"></div>
                    <input type="range" id="filter-fat-min" min="0" max="150" step="5" value="0">
                    <input type="range" id="filter-fat-max" min="0" max="150" step="5" value="150">
                </div>
            </div>
        </div>
        <button id="reset-filters" class="btn secondary" style="margin-top: 0.5rem;">Clear All</button>
    </div>
    <main class="container">
        <div id="recipe-grid" class="recipe-grid">
            <div class="empty-state">Loading...</div>
        </div>
    </main>

    <!-- Modal for Recipe Details -->
    <div id="recipe-modal" class="modal hidden">
        <div class="modal-content" id="modal-container">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            document.querySelectorAll('a[href="cms"]').forEach(el => el.style.display = 'none');
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
