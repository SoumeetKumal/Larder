<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry — Larder</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="favicon.svg" alt="Larder Logo" width="22" height="22">
            Larder
        </div>
        <div class="nav-controls">
            <input type="text" id="search-input" class="search-input" placeholder="Search ingredients..." aria-label="Search ingredients">
            <a href="./" class="nav-link">Recipes</a>
            <a href="pantry" class="nav-link">Pantry</a>
            <a href="basics" class="nav-link">Basics</a>
            <a href="appendix" class="nav-link">Appendix</a>
            <a href="cms" class="nav-link">Manage</a>
        </div>
    </nav>

    <!-- Category Filters -->
    <div class="filters-bar">
        <div class="category-filters" id="category-filters"></div>
    </div>
    <main class="container" role="main">
        <div id="recipe-grid" class="recipe-grid" role="list" aria-label="Recipe cards">
            <div class="empty-state">Loading...</div>
        </div>
    </main>

    <!-- Modal for Recipe Details -->
    <div id="recipe-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content" id="modal-container">
            <button class="close-btn" aria-label="Close modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            document.querySelectorAll('a[href="cms"]').forEach(el => el.style.display = 'none');
        }
    </script>

    <div id="gdpr-banner" class="gdpr-banner hidden no-print">
        <div class="gdpr-content">
            <p>Larder uses local storage solely to save your display preferences. We do not track or collect personal data.</p>
            <button id="gdpr-accept" class="btn primary">Got it</button>
        </div>
    </div>

    <footer class="site-footer no-print">
        <span>© <span id="current-year">2026</span> Larder. All rights reserved.</span>
        <div class="footer-links">
            <a href="legal#disclaimer">Disclaimer</a>
            <a href="legal#terms">Terms</a>
            <a href="legal#privacy">Privacy</a>
        </div>
    </footer>
    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
